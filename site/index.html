<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Абубакир Тухлиев</title>
<meta name="description" content="Сайт-разговор: всё, что ассистент помнит об Абубакире Тухлиеве. Python → ML/AI, практичные продукты, глубина важнее скорости.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF9F5;
    --surface: #FFFFFF;
    --bg-2: #F0EEE6;
    --bg-3: #E8E6DC;
    --text: #1F1E1D;
    --text-2: #73726C;
    --text-3: #A6A39A;
    --border: #E5E3D9;
    --border-2: #D9D7CC;
    --accent: #D97757;
    --accent-2: #C6613F;
    --serif: "Source Serif 4", Georgia, serif;
    --sans: "Schibsted Grotesk", "Helvetica Neue", sans-serif;
    --mono: "JetBrains Mono", monospace;
    --ease: cubic-bezier(.25, .8, .25, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    -webkit-tap-highlight-color: transparent;
  }

  ::selection { background: rgba(217, 119, 87, .22); }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  /* ── фоновая картина ── */
  .bg-art {
    position: fixed; left: 0; right: 0; top: 0;
    height: min(82vh, 760px);
    z-index: 0; pointer-events: none; overflow: hidden;
    -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 38%, rgba(0,0,0,.75) 62%, transparent 96%);
    mask-image: linear-gradient(to bottom, #000 0%, #000 38%, rgba(0,0,0,.75) 62%, transparent 96%);
    transition: opacity 1s var(--ease);
  }
  .bg-art img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center 72%;
    opacity: 0; filter: blur(18px); transform: scale(1.06);
    transition: opacity 1.6s var(--ease), filter 2s var(--ease), transform 2.4s var(--ease);
  }
  .bg-art.loaded img { opacity: .58; filter: blur(0); transform: scale(1); }
  .bg-art::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(250, 249, 245, .14), rgba(250, 249, 245, 0) 45%);
  }
  body.chatting .bg-art { opacity: .42; }

  header, main { position: relative; z-index: 1; }

  /* ── шапка ── */
  header {
    position: sticky; top: 0; z-index: 30;
    background: rgba(250, 249, 245, .82);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid transparent;
    transition: border-color .3s var(--ease);
  }
  header.scrolled { border-bottom-color: var(--border); }
  .h-in {
    max-width: 1080px; margin: 0 auto;
    padding: 0 20px; height: 52px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 500; font-size: 14.5px; letter-spacing: -.01em; }
  .brand svg { transition: transform .6s var(--ease); }
  .brand:hover svg { transform: rotate(40deg); }
  .h-right { display: flex; align-items: center; gap: 14px; }
  .pill {
    font-size: 12px; color: var(--text-2);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 4px 11px; white-space: nowrap;
    background: rgba(255, 255, 255, .4);
  }
  .pill b { color: var(--accent-2); font-weight: 600; }
  .h-link { font-size: 13px; color: var(--text-2); transition: color .25s; }
  .h-link:hover { color: var(--accent-2); }

  /* ── сцена ── */
  main {
    max-width: 740px; margin: 0 auto;
    padding: 0 20px;
    min-height: calc(100dvh - 52px);
    display: flex; flex-direction: column; justify-content: center;
  }
  body.chatting main { justify-content: flex-start; }

  /* ── приветствие ── */
  #greet { text-align: center; max-height: 50vh; transition: max-height .6s var(--ease), opacity .45s var(--ease), transform .45s var(--ease), margin .6s var(--ease); margin-bottom: 28px; }
  body.chatting #greet { max-height: 0; opacity: 0; transform: translateY(-12px); margin: 0; overflow: hidden; pointer-events: none; }
  .g-mark { display: inline-block; margin-bottom: 18px; }
  .g-mark svg { display: block; animation: markIn 1.1s var(--ease) both; }
  @keyframes markIn { from { opacity: 0; transform: scale(.5) rotate(-90deg); filter: blur(6px); } to { opacity: 1; transform: scale(1) rotate(0); filter: blur(0); } }
  #greet h1 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(30px, 5.4vw, 46px);
    letter-spacing: -.01em; line-height: 1.15; color: var(--text);
  }
  #greet h1 span { display: inline-block; animation: blurIn 1.15s var(--ease) .15s both; }
  @keyframes blurIn { from { opacity: 0; filter: blur(14px); transform: translateY(12px); } to { opacity: 1; filter: blur(0); transform: none; } }
  .g-sub { margin-top: 12px; font-size: 13.5px; color: var(--text-2); animation: fadeUp .9s var(--ease) .5s both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); filter: blur(7px); } to { opacity: 1; transform: none; filter: blur(0); } }

  /* ── лента сообщений ── */
  #thread { display: flex; flex-direction: column; gap: 26px; padding-top: 26px; }
  body.chatting #thread { flex: 1; }

  .msg-user { align-self: flex-start; max-width: 88%; animation: fadeUp .5s var(--ease) both; }
  .msg-user .bubble {
    background: var(--bg-2);
    border-radius: 16px;
    padding: 10px 16px;
    font-size: 15px; line-height: 1.55;
  }

  .msg-ai { animation: fadeUp .5s var(--ease) both; }
  .prose { font-family: var(--serif); font-size: 17px; line-height: 1.75; letter-spacing: .002em; }
  .prose p + p, .prose p + ul, .prose ul + p, .prose p + ol, .prose ol + p { margin-top: .95em; }
  .prose strong { font-weight: 600; }
  .prose em { font-style: italic; }
  .prose ul, .prose ol { padding-left: 1.35em; }
  .prose li { margin-top: .45em; }
  .prose li::marker { color: var(--text-2); }
  .prose code {
    font-family: var(--mono); font-size: .76em;
    background: var(--bg-2); border-radius: 5px;
    padding: 2.5px 6px; white-space: nowrap;
  }
  .prose a { color: var(--accent-2); border-bottom: 1px solid rgba(198, 97, 63, .35); transition: border-color .25s; }
  .prose a:hover { border-bottom-color: var(--accent-2); }

  .prose table {
    width: 100%; border-collapse: collapse;
    margin-top: 1em; font-size: 14.5px;
    background: rgba(255, 255, 255, .55);
  }
  .prose th, .prose td { border: 1px solid var(--border); padding: 9px 14px; text-align: left; }
  .prose th { background: #F5F4EE; font-weight: 600; font-size: 13.5px; }

  .artifact-card {
    margin-top: 1.1em;
    display: flex; align-items: center; gap: 13px;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--surface);
    padding: 12px 16px;
    font-family: var(--sans);
    transition: background .25s var(--ease), border-color .25s var(--ease), transform .25s var(--ease);
  }
  .artifact-card:hover { background: #FCFBF8; border-color: var(--border-2); transform: translateY(-1px); }
  .ac-icon {
    flex: 0 0 36px; height: 36px; border-radius: 9px;
    background: var(--bg-2); color: var(--text-2);
    display: grid; place-items: center;
  }
  .ac-body { min-width: 0; }
  .ac-t { font-size: 14px; font-weight: 600; letter-spacing: -.01em; }
  .ac-s { font-size: 12.5px; color: var(--text-2); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ac-arrow { margin-left: auto; color: var(--text-3); font-size: 13px; flex: 0 0 auto; }

  /* стриминг: слова проявляются из лёгкого блюра */
  .w { opacity: 0; filter: blur(5px); }
  .w.on { opacity: 1; filter: blur(0); transition: opacity .3s ease, filter .5s ease; }
  .chunk { opacity: 0; transform: translateY(6px); filter: blur(8px); }
  .chunk.on { opacity: 1; transform: none; filter: blur(0); transition: opacity .55s var(--ease), transform .55s var(--ease), filter .7s var(--ease); }
  .caret {
    display: inline-block; width: 8px; height: .95em;
    margin-left: 3px; border-radius: 2px;
    background: var(--accent); vertical-align: text-bottom;
    animation: blink 1s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .thinking { display: flex; align-items: center; gap: 10px; color: var(--text-2); font-size: 13.5px; animation: fadeUp .5s var(--ease) both; }
  .thinking svg { animation: think 1.4s ease-in-out infinite; }
  @keyframes think { 0%, 100% { transform: scale(1) rotate(0); opacity: .9; } 50% { transform: scale(.78) rotate(50deg); opacity: .45; } }

  /* действия под ответом */
  .actions { display: flex; gap: 4px; margin-top: 12px; opacity: 0; transition: opacity .5s var(--ease); }
  .msg-ai.done .actions { opacity: 1; }
  .act {
    width: 30px; height: 30px; border-radius: 8px;
    display: grid; place-items: center;
    color: var(--text-3);
    transition: background .2s, color .2s;
  }
  .act:hover { background: var(--bg-2); color: var(--text); }
  .act.lit { color: var(--accent-2); }

  /* ── композер ── */
  .dock {
    position: sticky; bottom: 0; z-index: 20;
    padding-top: 22px; padding-bottom: 14px;
    background: linear-gradient(to top, var(--bg) 72%, rgba(250, 249, 245, 0));
  }
  .composer {
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 18px;
    box-shadow: 0 4px 24px rgba(31, 30, 29, .05);
    transition: border-color .25s var(--ease), box-shadow .25s var(--ease);
  }
  .composer:focus-within { border-color: #C9C7BB; box-shadow: 0 8px 32px rgba(31, 30, 29, .08); }
  .composer textarea {
    display: block; width: 100%;
    border: 0; outline: 0; resize: none; background: none;
    font: 400 15px/1.55 var(--sans); color: var(--text);
    padding: 15px 18px 6px;
    max-height: 180px;
  }
  .composer textarea::placeholder { color: var(--text-3); }
  .c-bar { display: flex; align-items: center; gap: 6px; padding: 6px 10px 10px; }
  .c-btn {
    width: 32px; height: 32px; border-radius: 9px;
    display: grid; place-items: center; color: var(--text-2);
    transition: background .2s, color .2s;
  }
  .c-btn:hover { background: var(--bg-2); color: var(--text); }

  .model { position: relative; }
  .model-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-2);
    padding: 6px 10px; border-radius: 9px;
    transition: background .2s, color .2s;
  }
  .model-btn:hover { background: var(--bg-2); color: var(--text); }
  .model-pop {
    position: absolute; bottom: calc(100% + 8px); left: 0;
    width: 230px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 12px 32px rgba(31, 30, 29, .1);
    padding: 5px;
    opacity: 0; transform: translateY(6px); pointer-events: none;
    transition: opacity .25s var(--ease), transform .25s var(--ease);
  }
  .model.open .model-pop { opacity: 1; transform: none; pointer-events: auto; }
  .mp-item { padding: 9px 11px; border-radius: 8px; font-size: 13.5px; display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .mp-item small { font-size: 11.5px; color: var(--text-3); }
  .mp-item.cur { background: var(--bg-2); }
  .mp-item.cur small { color: var(--accent-2); }
  .mp-item.soon { opacity: .5; }

  .send {
    margin-left: auto;
    width: 32px; height: 32px; border-radius: 10px;
    display: grid; place-items: center;
    background: var(--bg-3); color: var(--text-3);
    transition: background .25s var(--ease), color .25s, transform .15s var(--ease);
  }
  .composer.ready .send { background: var(--accent); color: #fff; }
  .composer.ready .send:hover { background: var(--accent-2); }
  .send:active { transform: scale(.92); }

  /* подсказки */
  #chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 9px; margin-top: 16px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--border); border-radius: 11px;
    background: rgba(255, 255, 255, .55);
    padding: 8px 14px;
    font-size: 13px; color: var(--text-2);
    transition: background .25s var(--ease), color .25s, border-color .25s, transform .25s var(--ease), opacity .4s var(--ease);
    animation: fadeUp .8s var(--ease) both;
  }
  .chip svg { color: var(--text-3); transition: color .25s; }
  .chip:hover { background: var(--surface); color: var(--text); border-color: var(--border-2); transform: translateY(-1px); }
  .chip:hover svg { color: var(--accent); }
  .chip.gone { opacity: 0; transform: scale(.92); pointer-events: none; position: absolute; visibility: hidden; }

  .disclaimer { text-align: center; font-size: 11.5px; color: var(--text-3); margin-top: 13px; }

  @media (max-width: 600px) {
    .h-in { padding: 0 14px; }
    .pill { display: none; }
    main { padding: 0 14px; }
    .prose { font-size: 16px; }
    .prose th, .prose td { padding: 7px 10px; font-size: 13px; }
    .chip { font-size: 12.5px; padding: 8px 12px; }
    #chips { gap: 7px; }
    .bg-art { height: 62vh; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    .w, .chunk { opacity: 1 !important; transform: none !important; filter: none !important; }
    #greet h1 span, .g-sub, .g-mark svg { opacity: 1; transform: none; filter: none; }
    .bg-art img { opacity: .58; filter: none; transform: none; }
  }
</style>
</head>

      html: '<p>Абубакир Тухлиев — разработчик из Узбекистана, ему шестнадцать. Он совмещает школу и работу, а время между ними отдаёт коду: глубоко учит Python и собирает практичные продукты — от ботов и автоматизаций до полноценных веб-приложений.</p><p>Стек для него — инструмент, а не граница: сегодня это serverless и Telegram, завтра — то, чего потребует следующая задача. Длинная цель — позиция <strong>Junior ML/AI Engineer</strong>, к ней он идёт по личному роадмапу: без дедлайнов, но с дисциплиной. И почти в каждом фрагменте моей памяти повторяется одно правило — <em>глубина важнее скорости</em>.</p>'

    built: {

    who: '<circle cx="12" cy="8" r="3.4"/><path d="M5.5 19.5c.9-3.4 3.4-5 6.5-5s5.6 1.6 6.5 5"/>',
    rhythm: '<circle cx="12" cy="12" r="8.6"/><polyline points="12 7 12 12 15.5 14"/>',
    built: '<path d="M12 3 3 8l9 5 9-5-9-5z"/><path d="m3 12.5 9 5 9-5"/><path d="m3 17 9 5 9-5"/>',
    roadmap: '<path d="M5 21V4"/><path d="M5 5h12l-2.5 3.5L17 12H5"/>',
    principles: '<line x1="12" y1="3.5" x2="12" y2="20.5"/><line x1="3.5" y1="12" x2="20.5" y2="12"/><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/>',
    contact: '<path d="M21.5 3.5 10.8 14.2"/><path d="M21.5 3.5 14.5 21l-3.7-6.8L4 10.5z"/>'
  };

  var thread = document.getElementById('thread');
  var chipsBox = document.getElementById('chips');
  var composer = document.getElementById('composer');
  var ta = document.getElementById('ta');
  var sendBtn = document.getElementById('send');
  var busy = false;

  /* ── подсказки ── */
  var order = ['who', 'rhythm', 'built', 'roadmap', 'principles', 'contact'];
  order.forEach(function (id, i) {
    var b = document.createElement('button');
    b.className = 'chip';
    b.type = 'button';
    b.style.animationDelay = (.55 + i * .07) + 's';
    b.dataset.id = id;
    b.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">' + ICONS[id] + '</svg>' + ANSWERS[id].q;
    b.addEventListener('click', function () { ask(id, ANSWERS[id].q); });
    chipsBox.appendChild(b);
  });

  /* ── утилиты ── */
  function scrollBottom(force) {
    var nearBottom = innerHeight + scrollY >= document.body.scrollHeight - 180;
    if (force || nearBottom) scrollTo({ top: document.body.scrollHeight, behavior: REDUCED ? 'auto' : 'smooth' });
  }

  function wrapWords(root) {
    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: function (n) {
        if (!n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
        if (n.parentNode.closest('.chunk')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    var nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(function (node) {
      var frag = document.createDocumentFragment();
      node.nodeValue.split(/(\s+)/).forEach(function (part) {
        if (!part) return;
        if (/^\s+$/.test(part)) { frag.appendChild(document.createTextNode(part)); return; }
        var s = document.createElement('span');
        s.className = 'w';
        s.textContent = part;
        frag.appendChild(s);
      });
      node.parentNode.replaceChild(frag, node);
    });
  }

  function stream(prose, msg, done) {
    if (REDUCED) {
      msg.classList.add('done');
      if (done) done();
      return;
    }
    wrapWords(prose);
    var items = prose.querySelectorAll('.w, .chunk');
    var caret = document.createElement('span');
    caret.className = 'caret';
    prose.appendChild(caret);
    var i = 0;
    var timer = setInterval(function () {
      var step = 2 + (Math.random() < .3 ? 1 : 0);
      while (step-- && i < items.length) items[i++].classList.add('on');
      scrollBottom(false);
      if (i >= items.length) {
        clearInterval(timer);
        caret.remove();
        msg.classList.add('done');
        if (done) done();
      }
    }, 26);
  }

  function actionsBar(msg, id) {
    var bar = document.createElement('div');
    bar.className = 'actions';
    var icons = {
      copy: '<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>',
      ok: '<polyline points="4.5 12.5 9.5 17.5 19.5 6.5"/>',
      up: '<path d="M7 11v9H4.5A1.5 1.5 0 0 1 3 18.5v-6A1.5 1.5 0 0 1 4.5 11H7zm0 0 4-7c1.6 0 2.6 1 2.6 2.4 0 .9-.4 2.6-.7 3.6H19a2 2 0 0 1 2 2.3l-1 5.5A2 2 0 0 1 18 20H7"/>',
      down: '<path d="M17 13V4h2.5A1.5 1.5 0 0 1 21 5.5v6a1.5 1.5 0 0 1-1.5 1.5H17zm0 0-4 7c-1.6 0-2.6-1-2.6-2.4 0-.9.4-2.6.7-3.6H5a2 2 0 0 1-2-2.3l1-5.5A2 2 0 0 1 6 4h11"/>',
      retry: '<path d="M20 11a8 8 0 1 0-2.3 6.3"/><polyline points="20 5 20 11 14 11"/>'
    };
    function mk(name, label, fn) {
      var b = document.createElement('button');
      b.className = 'act';
      b.type = 'button';
      b.setAttribute('aria-label', label);
      b.title = label;
      b.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + icons[name] + '</svg>';
      b.addEventListener('click', function () { fn(b); });
      bar.appendChild(b);
      return b;
    }
    mk('copy', 'Скопировать', function (b) {
      var text = msg.querySelector('.prose').innerText;
      if (navigator.clipboard) navigator.clipboard.writeText(text);
      b.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + icons.ok + '</svg>';
      b.classList.add('lit');
      setTimeout(function () {
        b.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + icons.copy + '</svg>';
        b.classList.remove('lit');
      }, 1300);
    });
    var up = mk('up', 'Хороший ответ', function (b) { b.classList.toggle('lit'); dn.classList.remove('lit'); });
    var dn = mk('down', 'Так себе', function (b) { b.classList.toggle('lit'); up.classList.remove('lit'); });
    mk('retry', 'Перегенерировать', function () {
      if (busy || !id) return;
      busy = true;
      msg.classList.remove('done');
      renderAnswer(msg, id, function () { busy = false; });
    });
    return bar;
  }

  function renderAnswer(msg, id, done) {
    msg.innerHTML = '';
    var prose = document.createElement('div');
    prose.className = 'prose';
    prose.innerHTML = ANSWERS[id] ? ANSWERS[id].html : id;
    msg.appendChild(prose);
    msg.appendChild(actionsBar(msg, ANSWERS[id] ? id : null));
    stream(prose, msg, done);
  }

  /* ── диалог ── */
  function ask(id, text) {
    if (busy) return;
    busy = true;
    document.body.classList.add('chatting');

    var chip = chipsBox.querySelector('[data-id="' + id + '"]');
    if (chip) chip.classList.add('gone');

    var u = document.createElement('div');
    u.className = 'msg-user';
    u.innerHTML = '<div class="bubble"></div>';
    u.querySelector('.bubble').textContent = text;
    thread.appendChild(u);

    var think = document.createElement('div');
    think.className = 'thinking';
    think.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" style="color:var(--accent)"><use href="#spark"/></svg>Вспоминаю…';
    thread.appendChild(think);
    setTimeout(function () { scrollBottom(true); }, 60);

    setTimeout(function () {
      think.remove();
      var msg = document.createElement('div');
      msg.className = 'msg-ai';
      thread.appendChild(msg);
      renderAnswer(msg, id, function () { busy = false; });
    }, REDUCED ? 80 : 850);
  }

  var FALLBACK = '<p>Хороший вопрос — но среди шестидесяти семи фрагментов памяти точного ответа на него нет. Я честно не буду выдумывать.</p><p>Зато точно могу рассказать, кто такой Абубакир, какой у него ритм недели, что он уже построил, куда ведёт роадмап и каких принципов он держится — подсказки под полем ввода.</p>';

  function match(text) {
    var t = text.toLowerCase();
    if (/minisound|мини\s?саунд|музык|трек|плеер|стрим|проект|построил|сделал|портфолио/.test(t)) return 'built';
    if (/ритм|час|учеб|учёб|недел|расписан|режим/.test(t)) return 'rhythm';
    if (/роадмап|roadmap|план|ml|ai|машинн|python|пайтон|питон|этап/.test(t)) return 'roadmap';
    if (/принцип|правил|подход|ценност/.test(t)) return 'principles';
    if (/найти|контакт|связ|github|гитхаб|telegram|телеграм|написать/.test(t)) return 'contact';
    if (/кто|какой он|возраст|лет|узбек|школ|работ|о нем|о нём|расскажи/.test(t)) return 'who';
    return null;
  }

  function sendInput() {
    var text = ta.value.trim();
    if (!text || busy) return;
    ta.value = '';
    ta.style.height = 'auto';
    composer.classList.remove('ready');
    var id = match(text);
    if (id) { ask(id, text); return; }

    busy = true;
    document.body.classList.add('chatting');
    var u = document.createElement('div');
    u.className = 'msg-user';
    u.innerHTML = '<div class="bubble"></div>';
    u.querySelector('.bubble').textContent = text;
    thread.appendChild(u);

    var think = document.createElement('div');
    think.className = 'thinking';
    think.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" style="color:var(--accent)"><use href="#spark"/></svg>Ищу в памяти…';
    thread.appendChild(think);
    setTimeout(function () { scrollBottom(true); }, 60);

    setTimeout(function () {
      think.remove();
      var msg = document.createElement('div');
      msg.className = 'msg-ai';
      thread.appendChild(msg);
      msg.innerHTML = '';
      var prose = document.createElement('div');
      prose.className = 'prose';
      prose.innerHTML = FALLBACK;
      msg.appendChild(prose);
      msg.appendChild(actionsBar(msg, null));
      stream(prose, msg, function () { busy = false; });
    }, REDUCED ? 80 : 850);
  }

  sendBtn.addEventListener('click', sendInput);
  ta.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendInput(); }
  });
  ta.addEventListener('input', function () {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
    composer.classList.toggle('ready', !!ta.value.trim());
  });

  /* ── селектор «модели» ── */
  var model = document.getElementById('model');
  var modelBtn = model.querySelector('.model-btn');
  modelBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    var open = model.classList.toggle('open');
    modelBtn.setAttribute('aria-expanded', open);
  });
  document.addEventListener('click', function () {
    model.classList.remove('open');
    modelBtn.setAttribute('aria-expanded', 'false');
  });

  /* ── печатающийся плейсхолдер ── */
  var BASE_PH = 'Спросите что-нибудь об Абубакире…';
  var phrases = ['Кто такой Абубакир?', 'Что он уже построил?', 'Куда ведёт его роадмап?', 'Почему глубина важнее скорости?'];
  var pi = 0, ci = 0, deleting = false, phTimer = null;

  function phTick() {
    if (REDUCED) return;
    if (document.activeElement === ta || ta.value || document.body.classList.contains('chatting')) {
      ta.placeholder = BASE_PH;
      phTimer = setTimeout(phTick, 1500);
      return;
    }
    var cur = phrases[pi];
    if (!deleting) {
      ci++;
      ta.placeholder = cur.slice(0, ci);
      if (ci === cur.length) { deleting = true; phTimer = setTimeout(phTick, 2100); return; }
      phTimer = setTimeout(phTick, 55 + Math.random() * 50);
    } else {
      ci -= 2;
      if (ci <= 0) { ci = 0; deleting = false; pi = (pi + 1) % phrases.length; }
      ta.placeholder = cur.slice(0, ci);
      phTimer = setTimeout(phTick, 24);
    }
  }
  phTimer = setTimeout(phTick, 2400);
})();
</script>
</body>
</html>
